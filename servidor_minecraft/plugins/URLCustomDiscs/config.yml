# Configuration file for URLCustomDiscs plugin.


# ========== PLUGIN USAGE MODE ==========

# If you want to use the preconfigured remote API dedicated to the plugin, fill in the pluginUsageMode field with 'api'.
# If you want to use a personal installation and configuration, fill in the pluginUsageMode field with 'self-hosted'.
# If you only want the URLCustomDiscsPack.zip resource pack to be updated locally in your server files and duplicated to a custom path with a custom name, fill in the pluginUsageMode field with 'edit-only'.
# Note: Edit-Only mode can be useful if you already have an HTTP server serving another resource pack, and if you have a plugin that allows you to merge your current resource pack with the URLCustomDiscsPack.zip resource pack.
pluginUsageMode: api


# ========== REMOTE API MODE CONFIGURATION ==========

# API base URL used to make requests to the remote API.
apiBaseURL: http://167.235.148.137:80

# Unique token automatically generated for identification to the remote API when creating your first custom disc.
token: e072e000-b94c-4419-814b-3cae42371038

# Download URL of the resource pack, automatically generated when creating your first custom disc, which uses the token to locate your resource pack.
apiDownloadResourcePackURL: https://pub-39e459afc5e94b0ab76b05bb4bdcd798.r2.dev/e072e000-b94c-4419-814b-3cae42371038.zip
# Once your token and apiDownloadResourcePackURL have been generated, fill in the 'resource-pack=' field in your Minecraft server's 'server.properties' file, following the example below.
# Example: resource-pack=YOUR_apiDownloadResourcePackURL
# Then restart your Minecraft server.

# Once you have filled in the 'resource-pack=' field and tested that it works, you can now force players to install the resource pack by setting the 'require-resource-pack=' field to true in your Minecraft server's 'server.properties' file, following the example below.
# Example: require-resource-pack=true
# Then restart your Minecraft server.


# localYtDlp: If set to true, uses the yt-dlp tool, automatically downloaded according to the operating system of your Minecraft server, to download audio directly from YouTube.
# This allows you to continue using YouTube URLs even if the remote API is blocked by YouTube or other websites like soundcloud.
# Not recommended for shared Minecraft hosting providers (such as Shockbyte), as they usually block yt-dlp execution or are already IP-banned.
# You must restart your server after changing this option for it to take effect.
localYtDlp: false


# ========== SELF-HOSTED MODE CONFIGURATION ==========

# Resource pack access mode on the HTTP server that determines how the resource pack is retrieved and updated.
# Fill in the resourcePackAccessMode field with 'local' or 'online' depending on your setup and preference.
# - 'local': Access the resource pack on the HTTP server via an absolute path.
# - 'online': Download and upload the resource pack on the HTTP server via HTTP requests.
# Available options for the two possible configurations:
# - If your Minecraft server and HTTP server are on the same machine, you can use either 'local' or 'online'.
# - If your Minecraft server and HTTP server are on different machines, you must use 'online'.
resourcePackAccessMode: local


# If you are using the local resource pack access mode, fill in the zipFileAbsolutePath field.

# Absolute path to the URLCustomDiscsPack.zip resource pack, hosted on the HTTP server, for editing.
# Example for Windows: C:/Apache24/htdocs/URLCustomDiscsPack.zip
# Example for Linux: /var/www/html/URLCustomDiscsPack.zip
zipFileAbsolutePath: C:/Apache24/htdocs/URLCustomDiscsPack.zip


# If you are using the online resource pack access mode, fill in both the downloadResourcePackURL and uploadResourcePackURL fields.

# Download URL of the URLCustomDiscsPack.zip resource pack from the HTTP server, used to retrieve and edit the resource pack.
# Example: http://11.111.11.1:80/URLCustomDiscsPack.zip
downloadResourcePackURL: http://11.111.11.1:80/URLCustomDiscsPack.zip

# Upload URL of the URLCustomDiscsPack.zip resource pack to the HTTP server, used to update the resource pack.
# Example: http://11.111.11.1:80/upload.php
uploadResourcePackURL: http://11.111.11.1:80/upload.php


# ========== EDIT-ONLY MODE CONFIGURATION ==========

# Path (including the custom filename) to the duplicated URLCustomDiscsPack.zip resource pack, relative to the plugins folder, for merging or other use.
# Example: OtherPlugin/merge_folder/PackToMerge.zip
duplicatedZipFilePath: URLCustomDiscs/edit-only_mode_reference_resource_pack/duplicated_resource_pack/DuplicatedURLCustomDiscsPack.zip
