# Enable this module? true / false
# THIS MODULE REQUIRES SENTRY PRIME!
# THIS MODULE REQUIRES YOUR SERVER TO BE RUNNNG AT LEAST MC 1.16.5+ AND PAPERMC! (or other forks)
module-enabled: true

# If true, players with sentry.bypass.hack-blocker will not be checked by Sentry.
permission-bypass: true

# Should the plugin re-check players again after they change worlds?
check-world-change: false

freecam:
  block: true
  on-detect:
    execute-command: "" # Leave "" to disable
    kick: "&5&lSentry\n&cYou are not allowed to use Freecam on this server!"
    notify-admins: true # Default: true

# Wurst already patched it's newer versions, so unfortunately they are not possible to be detected by Sentry.
# Anyway, older versions of Wurst still are detectable and Sentry can block it.
wurst:
  block: true
  on-detect:
    execute-command: "" # Leave "" to disable
    kick: "&5&lSentry\n&cYou are not allowed to use Wurst Client on this server!"
    notify-admins: true # Default: true

# Same as Wurst, Liquidbounce already patched newer versions,
# Anyway, older versions can still be detected by Sentry.
